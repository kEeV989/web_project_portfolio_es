<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portafolio</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>
  <body>
    <header>
      <!--aqui va la navegacion-->
    </header>
    <main>
      <section class="hero">
        <div class="hero__container">
          <div class="hero__text">
            <h1 class="hero__title">Kevin Valdez</h1>
            <p class="hero__subtitle">Web developer</p>
          </div>

          <div class="hero__image">
            <img src="./images/profile.jpg" alt="Profile photo" />
          </div>
        </div>
      </section>

      <section class="projects">
        <div class="container">
          <h2 class="projects__title">Projects</h2>

          <div class="projects__grid">
            <div class="project-card">
              <img src="./images/inside_coffee_shop.jpg" alt="Proyecto 1" />
              <div class="project-card__overlay">
                <h3>Library Coffee Shop Website</h3>
              </div>
            </div>

            <div class="project-card">
              <img src="./images/profile.jpg" alt="Proyecto 2" />
              <div class="project-card__overlay">
                <h3>Personal Portafolio Website</h3>
                <p>Responsive layout using HTML & CSS</p>
              </div>
            </div>

            <div class="project-card">
              <img
                src="./images/sistema afiliados agencia tours.jpg"
                alt="Proyecto 3"
              />
              <div class="project-card__overlay">
                <h3>Affiliate Management Platfrom</h3>
                <p>Dashboard UI for managing bookings and partners</p>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <!--colocar footer aqui-->
    </footer>
  </body>
</html>
